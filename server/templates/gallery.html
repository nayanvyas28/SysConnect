{% extends "base.html" %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2 style="margin: 0;">Screenshot Gallery</h2>
        <form action="/gallery" method="get" style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
            <input type="text" name="search_hostname" value="{{ search_hostname }}" placeholder="Search hostname..."
                style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-color);">
            <input type="date" name="search_date" value="{{ search_date }}"
                style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-color);">
            <button type="submit"
                style="background-color: var(--accent); color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">Search</button>
        </form>
    </div>
    <form action="/gallery/delete_multiple" method="post" id="deleteMultipleForm">
        <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-color);">
                <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)" style="transform: scale(1.2);">
                <strong>Select All</strong>
            </label>
            <button type="submit" onclick="return confirm('Are you sure you want to delete selected images?')"
                style="background-color: #ff4d4d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;">Delete
                Selected</button>
        </div>

        <script>
            function toggleSelectAll(source) {
                var checkboxes = document.getElementsByName('shot_ids');
                for (var i = 0, n = checkboxes.length; i < n; i++) {
                    checkboxes[i].checked = source.checked;
                }
            }
        </script>

        <div class="grid">
            {% for shot in screenshots %}
            <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; position: relative;">
                <input type="checkbox" name="shot_ids" value="{{ shot.id }}"
                    style="position: absolute; top: 15px; left: 15px; transform: scale(1.5); z-index: 10; cursor: pointer; box-shadow: 0 0 0 2px rgba(255,255,255,0.8);">

                <a href="{% if shot.file_path.startswith('http') %}{{ shot.file_path }}{% else %}/{{ shot.file_path.lstrip('/') }}{% endif %}"
                    target="_blank">
                    <img src="{% if shot.file_path.startswith('http') %}{{ shot.file_path }}{% else %}/{{ shot.file_path.lstrip('/') }}{% endif %}"
                        class="screenshot-thumb" alt="Screenshot"
                        style="border-radius: 4px; display: block; filter: brightness(0.9); width: 100%; aspect-ratio: 16/9; object-fit: cover;">
                </a>
                <div style="display: flex; justify-content: space-between; align-items: start; margin-top: 8px;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 0;">
                        {{ shot.agent.hostname }}
                    </p>
                    <button type="button"
                        onclick="if(confirm('Are you sure you want to delete this image?')) { document.getElementById('del-form-{{ shot.id }}').submit(); }"
                        style="background-color: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">Delete</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </form>
    {% for shot in screenshots %}
    <form id="del-form-{{ shot.id }}" action="/gallery/delete/{{ shot.id }}" method="post" style="display: none;">
    </form>
    {% endfor %}
</div>
{% endblock %}
